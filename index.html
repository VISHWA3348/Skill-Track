<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Track</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="description" content="Skill Track is a comprehensive student certificate tracking, verification, career development and academic management platform." />
    <meta name="application-name" content="Skill Track" />
    <meta property="og:title" content="Skill Track" />
    <meta name="twitter:title" content="Skill Track" />
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var theme = savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.classList.add(theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
